    const levelQuestions = questionsData.filter(q => q.level === currentLevel.id);
    const currentQ = levelQuestions[questionPos] || levelQuestions[0];
    const globalProgressNumber = state === "question" || state === "feedback" ? currentQ.id : Math.min(Object.keys(answers).length + 1, questionsData.length);
    const globalProgressPercent = Math.min(100, Math.round((globalProgressNumber / questionsData.length) * 100));
    const showScoreHeader = ["levelIntro", "question", "feedback"].includes(state);

    function ScoreHeader() {
      return <div className="score-header" aria-label="答題進度">
        <div className="score-progress"><div className="label">進度 {globalProgressNumber} / {questionsData.length}</div><div className="track"><div className="fill" style={{width:`${globalProgressPercent}%`}}></div></div></div>
      </div>;
    }

    useEffect(() => {
      if (state === "result") {
        window.submitToGoogleSheet({
          submittedAt: new Date().toISOString(), nickname, birthYear, totalScore, scores,
          tierTitle:tier.title, answers, selectedItems:inventory.map(i=>i.text)
        });
      }
    }, [state]);

    function startAdventure(e) {
      e.preventDefault();
      if (!nickname.trim()) return alert("請輸入冒險者名稱");
      if (!/^\d{4}$/.test(String(birthYear).trim())) return alert("請輸入西元出生年，例如 2014");
      setState("time");
    }
    function enterLevel() { setQuestionPos(0); setState("levelIntro"); }
    function beginQuestions() { setState("question"); }
    function answer(isYes) {
      if (isYes) {
        setScores(prev => ({ ...prev, [currentQ.type]: prev[currentQ.type] + currentQ.weight }));
        setInventory(prev => [...prev, { id:currentQ.id, text:currentQ.text, type:currentQ.type, levelName:currentQ.levelName }]);
      }
      setAnswers(prev => ({ ...prev, [currentQ.id]: isYes }));
      setLastAnswer(isYes); setState("feedback");
    }
    function undo() {
      if (lastAnswer === true) {
        setScores(prev => ({ ...prev, [currentQ.type]: prev[currentQ.type] - currentQ.weight }));
        setInventory(prev => prev.filter(i => i.id !== currentQ.id));
      }
      setAnswers(prev => { const next={...prev}; delete next[currentQ.id]; return next; });
      setState("question");
    }
    function nextQuestion() {
      if (questionPos < levelQuestions.length - 1) { setQuestionPos(questionPos+1); setState("question"); return; }
      const doneId = currentLevel.id;
      setCompleted(prev => prev.includes(doneId) ? prev : [...prev, doneId]);
      if (levelIndex < levelMeta.length - 1) { setLevelIndex(levelIndex+1); setState("map"); }
      else { setLevelIndex(3); setState("map"); }
    }
    function openCastle() { setState("result"); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50); }
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }
    function drawCropContain(ctx, img, crop, rect) {
      const [sx, sy, sw, sh] = crop;
      const [x, y, w, h] = rect;
      const scale = Math.min(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      ctx.drawImage(img, sx, sy, sw, sh, x + (w - dw) / 2, y + h - dh, dw, dh);
    }
    function drawCentered(ctx, text, rect, size, color) {
      const [x, y, w, h] = rect;
      ctx.fillStyle = color;
      ctx.font = `900 ${size}px "Microsoft JhengHei", "Noto Sans TC", sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(text), x + w / 2, y + h / 2);
    }
    function drawWrappedLines(ctx, lines, rect, size, color) {
      const [x, y, w, h] = rect;
      const lineHeight = size * 1.55;
      const startY = y + (h - lineHeight * lines.length) / 2 + size * .62;
      ctx.fillStyle = color;
      ctx.font = `850 ${size}px "Microsoft JhengHei", "Noto Sans TC", sans-serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      lines.forEach((line, index) => ctx.fillText(line, x, startY + index * lineHeight, w));
    }
    async function downloadCertificate() {
      const [background, character, badge] = await Promise.all([
        loadImage(certificateAssetData[Object.keys(certificateAssetData).find(name => name.includes("v6"))]),
        loadImage(certificateAssetData[tier.character] || tier.character),
        loadImage(certificateAssetData[tier.badge] || tier.badge)
      ]);
      const canvas = document.createElement("canvas");
      canvas.width = 1536;
      canvas.height = 1024;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(background, 0, 0, 1536, 1024);
      drawCropContain(ctx, character, tier.crop.character, tier.draw.character);
      drawCropContain(ctx, badge, tier.crop.badge, tier.draw.badge);
      drawCentered(ctx, nickname || "冒險者", [166, 300, 289, 68], 54, "#4f2208");
      drawCentered(ctx, tier.title, [1053, 223, 342, 88], 54, "#4b2208");
      drawWrappedLines(ctx, tier.trait, [1076, 395, 303, 128], 24, "#4b260b");
      drawCentered(ctx, totalScore, [164, 453, 283, 116], 82, "#5b2608");
      drawCentered(ctx, scores.economic, [280, 894, 108, 50], 38, "#b56a16");
      drawCentered(ctx, scores.cultural, [623, 894, 108, 50], 38, "#247b60");
      drawCentered(ctx, scores.social, [935, 894, 108, 50], 38, "#b23862");
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `冒險證書_${safeName(nickname)}.png`;
      a.click();
    }
    async function downloadNode(ref, filename) {
      if (!ref.current) return;
      const canvas = await html2canvas(ref.current, { scale:2, backgroundColor:"#fffdf7", useCORS:true });
      const a=document.createElement("a"); a.href=canvas.toDataURL("image/png"); a.download=filename; a.click();
    }
    function restart() { location.reload(); }

    function inventoryByType(type) {
      return inventory.filter(item => item.type === type);
    }
    function typeMeta(type) {
      if (type === "economic") return { icon:"💰", title:"物資補給箱", max:maxScores.economic, score:scores.economic, explain:"這一區記錄生活資源、金錢資源、居住與交通便利等條件。它不代表一個人是否努力，而是代表冒險開始時，背包裡已經有哪些物資。" };
      if (type === "cultural") return { icon:"📜", title:"天賦技能樹", max:maxScores.cultural, score:scores.cultural, explain:"這一區記錄閱讀、學習經驗、才藝、旅行與家庭教育資源。它像技能樹一樣，會影響一個人看見世界與理解世界的方式。" };
      return { icon:"🛡️", title:"盟友守護陣", max:maxScores.social, score:scores.social, explain:"這一區記錄安全感、情感支持、社會接納與人際網絡。它像冒險隊伍裡的盾牌，讓人在遇到困難時比較不容易孤單。" };
    }

    return <div className="app">
      {showScoreHeader && <ScoreHeader />}
      {state === "cover" && <div className="screen-bg"><div className="frame cover">
        <form className="glass-panel" onSubmit={startAdventure}>
          <div className="field-row">
            <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="冒險者名稱" />
            <input value={birthYear} onChange={e=>setBirthYear(e.target.value)} placeholder="西元出生年，例如 2014" inputMode="numeric" />
            <button className="main-btn" type="submit">開始冒險</button>
          </div>
        </form>
      </div></div>}

      {state === "time" && <div className="screen-bg"><div className="frame time">
        <div className="name-board">{nickname}</div>
        <button className="time-start-btn" type="button" aria-label="沒問題，出發" onClick={()=>setState("map")}>沒問題，出發</button>
      </div></div>}

      {state === "map" && <div className="screen-bg"><div className="frame map">
        <div className="map-title">{nickname} 的冒險地圖</div>
        <button className={`map-node ${levelIndex===0?"active":"done"}`} style={{left:"24.5%",top:"39%", "--node-w":"25%", "--node-h":"29%"}} aria-label="前往第1關：物資補給箱" onClick={levelIndex===0 ? enterLevel : undefined}>物資補給箱</button>
        <button className={`map-node ${levelIndex===1?"active":completed.includes(2)?"done":"locked"}`} style={{left:"51.8%",top:"51%", "--node-w":"28%", "--node-h":"48%"}} aria-label="前往第2關：天賦技能樹" onClick={levelIndex===1 ? enterLevel : undefined}>天賦技能樹</button>
        <button className={`map-node ${levelIndex===2?"active":completed.includes(3)?"done":"locked"}`} style={{left:"80%",top:"75%", "--node-w":"29%", "--node-h":"30%"}} aria-label="前往第3關：盟友守護陣" onClick={levelIndex===2 ? enterLevel : undefined}>盟友守護陣</button>
        <button className={`map-node ${levelIndex===3?"active":"locked"}`} style={{left:"82%",top:"26%", "--node-w":"21%", "--node-h":"29%"}} aria-label="前往冒險者公會，領取證書" onClick={levelIndex===3 ? openCastle : undefined}>冒險者公會</button>
      </div></div>}

      {state === "levelIntro" && <div className="play-screen"><div className="card">
        <h1>{currentLevel.icon} {currentLevel.name}</h1><p style={{fontSize:22,fontWeight:800,lineHeight:1.7}}>{currentLevel.intro}</p>
        <button className="main-btn" onClick={beginQuestions}>開始第{currentLevel.id}關</button>
      </div></div>}

      {state === "question" && <div className="play-screen"><div className="card">
        <div className="progress"><span>{currentLevel.icon} {currentLevel.name}</span><div className="bar"><div style={{width:`${Math.round(((questionPos+1)/levelQuestions.length)*100)}%`}}></div></div><span>{questionPos+1} / {levelQuestions.length}</span></div>
        <div className="qbox"><div className="qicon">{currentLevel.icon}</div><div className="qtext">{currentQ.text}</div></div>
        <div className="answer-grid"><button className="no" onClick={()=>answer(false)}>❌ 無體驗過</button><button className="yes" onClick={()=>answer(true)}>⭕ 有體驗過</button></div>
      </div></div>}

      {state === "feedback" && <div className="play-screen"><div className="card feedback">
        <h2>{lastAnswer ? "🎉 獲得裝備！" : "🛡️ 冒險者筆記"}</h2>
        <p>{lastAnswer ? currentQ.yesText : currentQ.noText}</p>
        <div className="field-row"><button className="main-btn" onClick={undo}>↩️ 重選</button><button className="main-btn" onClick={nextQuestion}>下一步 ➜</button></div>
      </div></div>}

      {state === "result" && <div className="result-wrap">
        <div ref={certRef} className="certificate" aria-label="冒險證書">
          <div className="cert-name">{nickname}</div>
          <div className="cert-character-wrap">
            <img className="cert-character" src={tier.character} style={{"--character-w":tier.characterStyle.w,"--character-x":tier.characterStyle.x,"--character-y":tier.characterStyle.y}} />
          </div>
          <div className="cert-title">{tier.title}</div>
          <div className="cert-trait">{tier.trait.map((line,i)=><React.Fragment key={i}>{line}{i<tier.trait.length-1 && <br/>}</React.Fragment>)}</div>
          <div className="cert-badge-wrap">
            <img className="cert-badge" src={tier.badge} style={{"--badge-w":tier.badgeStyle.w,"--badge-x":tier.badgeStyle.x,"--badge-y":tier.badgeStyle.y}} />
          </div>
          <div className="cert-score">{totalScore}</div>
          <div className="cert-capital economic">{scores.economic}</div>
          <div className="cert-capital cultural">{scores.cultural}</div>
          <div className="cert-capital social">{scores.social}</div>
        </div>
        <div className="result-actions"><button className="main-btn" onClick={downloadCertificate}>下載冒險證書</button><button className="main-btn" onClick={()=>downloadNode(journalRef, `冒險日誌_${safeName(nickname)}.png`)}>下載冒險日誌</button><button className="main-btn" onClick={restart}>重新開始</button></div>
        <div ref={journalRef} className="journal">
          <h2>📖 {nickname} 的冒險日誌</h2>
          <div className="journal-section journal-text">
            <h3>一、冒險開局值</h3>
            <p><b>{totalScore} / {maxScores.total}</b></p>
            <p>這不是排名，也不是誰比較厲害，而是用來理解每位冒險者的開局條件。分數越高，代表一開始背包裡可使用的資源、支持與通行證越多；分數越低，代表冒險路上可能需要花更多力氣面對關卡。</p>
            <p>請把它想成 RPG 裡的「開局道具」：有人一開始就有較多補給、技能與隊友，有人則需要在路上一步一步尋找資源。開局不同，不代表人的價值不同，也不代表最後一定會走向同一種結局。</p>
          </div>
          <div className="journal-section journal-text">
            <h3>二、冒險者公會等級一覽表</h3>
            <div className="tier-grid">
              {tiers.map((item, index)=><div key={index} className={`tier-card ${tier.title===item.title ? "active" : ""}`}><div style={{fontSize:34}}>{item.icon}</div><div>{item.title}</div><small>{item.label}</small>{tier.title===item.title && <div>👈 你在這裡</div>}</div>)}
            </div>
          </div>
          <div className="journal-section journal-text">
            <h3>三、角色分析：{tier.title}</h3>
            <p><b>角色模式：</b>{tier.mode}</p>
            <p><b>角色精神：</b>{tier.core}</p>
            <p><b>角色關鍵字：</b>{tier.keywords}</p>
            <div className="journal-callout slate"><h4>📊 狀態分析</h4><p>{tier.status}</p></div>
            <div className="journal-callout"><h4>💡 給冒險者的建議</h4><p>{tier.advice}</p></div>
          </div>
          <div className="journal-section journal-text">
            <h3>四、三大資本分析</h3>
            <div className="capital-list"><div className="mini-card">💰 物資補給箱<br/>{scores.economic} / {maxScores.economic}</div><div className="mini-card">📜 天賦技能樹<br/>{scores.cultural} / {maxScores.cultural}</div><div className="mini-card">🛡️ 盟友守護陣<br/>{scores.social} / {maxScores.social}</div></div>
            <div className="capital-explain">
              {["economic","cultural","social"].map(type => { const m=typeMeta(type); return <div key={type} className="mini-card"><b>{m.icon} {m.title}：{m.score} / {m.max}</b><br/>{m.explain}</div>; })}
            </div>
          </div>
          <div className="journal-section journal-text">
            <h3>五、背包清單</h3>
            {inventory.length ? <div>{["economic","cultural","social"].map(type => { const m=typeMeta(type); const items=inventoryByType(type); if(!items.length) return null; return <div className="bag-group" key={type}><h4>{m.icon} {m.title}（{items.length}項）</h4><ul className="bag-list">{items.map(item=><li key={item.id}>{item.text}</li>)}</ul></div>; })}</div> : <p>你的背包非常輕盈，這也代表你一路走來更需要靠自己的勇氣前進。</p>}
          </div>
          <div className="journal-section journal-text">
            <h3>六、冒險故事</h3>
            <p>{tier.story}</p>
            <p>你完成了物資補給箱、天賦技能樹與盟友守護陣三段旅程，最後抵達冒險者公會。這份日誌記錄的不是勝負，而是你如何理解自己的起點。</p>
          </div>
          <div className="journal-section journal-text">
            <h3>七、給冒險者的提醒</h3>
            <p>請記得：每個人的背包重量不同，能走到這裡都值得被看見。理解自己的開局，也能幫助我們更溫柔地理解別人。</p>
          </div>
        </div>
      </div>}
    </div>;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
